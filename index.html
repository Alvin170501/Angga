<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Timer & Alarm</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 350px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { margin-bottom: 0.5rem; font-size: 1.5rem; letter-spacing: -0.025em; }
        p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 2rem; }

        input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 14px;
            font-size: 1.1rem;
            color: white;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:active { transform: scale(0.98); }

        .result-box {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 20px;
            border: 1px dashed #334155;
        }

        .time-display {
            font-size: 3rem;
            font-weight: 800;
            font-family: monospace;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .status { font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; text-transform: uppercase; }

        /* Animasi saat jalan */
        .is-running { border-color: var(--accent) !important; animation: glow 2s infinite; }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(16, 185, 129, 0.1); }
            50% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Timer Pro ⏱️</h2>
    <p>1 Item = 5 Detik</p>
    
    <input type="number" id="itemInput" placeholder="Jumlah Item (misal: 15)" min="1">
    <button onclick="startTimer()">Mulai Timer</button>

    <div class="result-box" id="resultBox">
        <div class="time-display" id="timeDisplay">00:00</div>
        <div class="status" id="statusLabel">Standby</div>
    </div>
</div>

<audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    let timer;
    const alarm = document.getElementById('alarmSound');
    const display = document.getElementById('timeDisplay');
    const statusLabel = document.getElementById('statusLabel');
    const box = document.getElementById('resultBox');

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function startTimer() {
        const input = document.getElementById('itemInput').value;
        let totalSeconds = parseInt(input) * 5;

        if (isNaN(totalSeconds) || totalSeconds <= 0) {
            alert("Masukkan jumlah item dulu ya!");
            return;
        }

        // Reset & Start
        clearInterval(timer);
        alarm.pause(); 
        alarm.currentTime = 0;
        
        statusLabel.innerText = "Running...";
        statusLabel.style.color = "#10b981";
        box.classList.add('is-running');

        display.innerText = formatTime(totalSeconds);

        timer = setInterval(() => {
            totalSeconds--;
            
            if (totalSeconds >= 0) {
                display.innerText = formatTime(totalSeconds);
            } else {
                clearInterval(timer);
                finishTimer();
            }
        }, 1000);
    }

    function finishTimer() {
        statusLabel.innerText = "Waktu Habis!";
        statusLabel.style.color = "#ef4444";
        box.classList.remove('is-running');
        
        // Play Alarm
        alarm.play().catch(e => console.log("User interaction required for audio"));
        
        // Alert sebagai backup
        setTimeout(() => {
            alert("⏰ Waktu Beres!");
        }, 500);
    }
</script>

</body>
</html>
